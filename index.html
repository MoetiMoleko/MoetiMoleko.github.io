        // Compute current streak from completion history, respecting scheduled days
        const computeStreak = (habit, completions) => {
            let streak = 0;
            const d = new Date();
            // If today is scheduled but not yet done, start counting from yesterday
            const todayKey = localDateStr(d);
            const doneToday = completions[todayKey]?.[habit.id];
            if (!doneToday) d.setDate(d.getDate() - 1);
            for (let i = 0; i < 730; i++) {
                const key = localDateStr(d);
                if (isScheduledOn(habit, d.getDay())) {
                    if (completions[key]?.[habit.id]) streak++;
                    else break;
                }
                d.setDate(d.getDate() - 1);
            }
            return streak + (doneToday ? 0 : 0);

            const [idx, setIdx] = useState(0);
            const [phase, setPhase] = useState('work'); // work | rest
            const [setNum, setSetNum] = useState(1);
            const [seconds, setSeconds] = useState(routine.exercises[0].workSeconds || 60);
            const [running, setRunning] = useState(false);
            const timerRef = useRef(null);
            const ex = routine.exercises[idx];

            useEffect(() => {
                if (!running) return;
                timerRef.current = setInterval(() => setSeconds(s => {
                    if (s <= 1) { clearInterval(timerRef.current); handlePhaseEnd(); return 0; }
                    return s - 1;
                }), 1000);
                return () => clearInterval(timerRef.current);
            }, [running, phase, setNum, idx]);

            const beep = () => { try { const c = new (window.AudioContext || window.webkitAudioContext)(); const o = c.createOscillator(); o.connect(c.destination); o.frequency.value = 880; o.start(); setTimeout(() => { o.stop(); c.close(); }, 250); } catch (e) {} };

            const handlePhaseEnd = () => {
                beep();
                setRunning(false);
                if (phase === 'work') {
                    if (setNum < ex.sets) { setPhase('rest'); setSeconds(ex.rest || 30); setRunning(true); }
                    else nextExercise();
                } else {
                    setPhase('work'); setSetNum(n => n + 1); setSeconds(ex.workSeconds || 60); setRunning(true);
                }
            };
            const nextExercise = () => {
                if (idx + 1 >= routine.exercises.length) { onFinish(); return; }
                const n = idx + 1;
                setIdx(n); setPhase('work'); setSetNum(1);
                setSeconds(routine.exercises[n].workSeconds || 60); setRunning(false);
            };
            const fmt = s => `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
            const card = dark ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200';
            const tp = dark ? 'text-gray-100' : 'text-gray-800';
            const ts = dark ? 'text-gray-400' : 'text-gray-600';

            return (
                <div className="p-4 space-y-4">
                    <div className={`text-xs font-semibold uppercase tracking-wide ${ts}`}>Exercise {idx + 1} of {routine.exercises.length} · Set {setNum} of {ex.sets}</div>
                    <div className={`${card} rounded-2xl p-5 border shadow-sm`}>
                        <h2 className={`text-xl font-bold ${tp} mb-1`}>{ex.name}</h2>
                        <p className="text-sm text-purple-500 font-medium mb-3">{ex.reps}{ex.rest ? ` · ${ex.rest}s rest between sets` : ''}</p>
                        <div className={`text-center my-6 ${phase === 'rest' ? 'text-blue-500' : 'text-purple-500'}`}>
                            <div className="text-6xl font-bold tabular-nums">{fmt(seconds)}</div>
                            <div className="text-sm font-semibold uppercase tracking-widest mt-1">{phase === 'rest' ? 'Rest' : 'Work'}</div>
                        </div>
                        <div className="flex space-x-2">
                            <button onClick={() => setRunning(r => !r)} className="flex-1 bg-purple-500 hover:bg-purple-600 text-white py-3 rounded-xl font-semibold">{running ? 'Pause' : 'Start'}</button>
                            <button onClick={handlePhaseEnd} className={`px-4 py-3 rounded-xl border ${dark ? 'border-gray-600 text-gray-300' : 'border-gray-300 text-gray-600'} font-medium`}>Skip</button>
                        </div>
                    </div>
                    <div className={`${card} rounded-2xl p-4 border text-sm space-y-3`}>
                        <div><p className={`font-semibold ${tp}`}>Position</p><p className={ts}>{ex.position}</p></div>
                        <div><p className={`font-semibold ${tp}`}>Movement</p><p className={ts}>{ex.movement}</p></div>
                        <div><p className={`font-semibold ${tp}`}>Why</p><p className={ts}>{ex.why}</p></div>
                    </div>
                    <div className="flex justify-between text-sm">
                        <button onClick={onExit} className={ts}>Exit routine</button>
                        <button onClick={nextExercise} className="text-purple-500 font-medium">Next exercise →</button>
                    </div>
                </div>
            );
        }

        // ── MAIN APP ──────────────────────────────────────────────────────────
        function HabitTracker() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [habits, setHabits] = useState([]);
            const [completions, setCompletions] = useState({});
            const [exerciseLog, setExerciseLog] = useState({});
            const [customRoutines, setCustomRoutines] = useState([]);
            const [notes, setNotes] = useState([]);
            const [weightEntries, setWeightEntries] = useState([]);
            const [goalWeight, setGoalWeight] = useState('');
            const [weightUnit, setWeightUnit] = useState('kg');

            const [currentView, setCurrentView] = useState('today');
            const [activeRoutine, setActiveRoutine] = useState(null);
            const [playingRoutine, setPlayingRoutine] = useState(false);
            const [darkMode, setDarkMode] = useState(false);
            const [notificationsEnabled, setNotificationsEnabled] = useState(false);
            const [isOffline, setIsOffline] = useState(!navigator.onLine);
            const [selectedMonth, setSelectedMonth] = useState(new Date().getMonth());
            const [selectedYear, setSelectedYear] = useState(new Date().getFullYear());
            const [toast, setToast] = useState('');

            // Forms
            const [showAddForm, setShowAddForm] = useState(false);
            const [editingHabit, setEditingHabit] = useState(null);
            const [habitForm, setHabitForm] = useState({ name: '', reminderTime: '09:00', category: 'health', days: [0,1,2,3,4,5,6], remindersOn: true });
            const [newNoteTitle, setNewNoteTitle] = useState('');
            const [newNoteText, setNewNoteText] = useState('');
            const [showNoteForm, setShowNoteForm] = useState(false);
            const [newWeight, setNewWeight] = useState('');
            const [newWeightDate, setNewWeightDate] = useState(localDateStr());
            const [showWeightForm, setShowWeightForm] = useState(false);
            const [showGoalForm, setShowGoalForm] = useState(false);
            const [goalWeightInput, setGoalWeightInput] = useState('');
            const [showRoutineForm, setShowRoutineForm] = useState(false);
            const [routineForm, setRoutineForm] = useState({ name: '', emoji: '🏋️', exercisesText: '' });

            const firedReminders = useRef({});

            const allRoutines = [...BUILTIN_ROUTINES, ...customRoutines];
            const today = localDateStr();

            useEffect(() => {
                setDarkMode(localStorage.getItem('darkMode') === 'true');
                setWeightUnit(localStorage.getItem('weightUnit') || 'kg');
                const on = () => setIsOffline(false), off = () => setIsOffline(true);
                window.addEventListener('online', on); window.addEventListener('offline', off);
                const unsub = auth.onAuthStateChanged(u => {
                    setUser(u); setLoading(false);
                    if (u) { loadUserData(u.uid); if ('Notification' in window) setNotificationsEnabled(Notification.permission === 'granted'); }
                });
                return () => { unsub(); window.removeEventListener('online', on); window.removeEventListener('offline', off); };
            }, []);
            useEffect(() => { localStorage.setItem('darkMode', darkMode); }, [darkMode]);
            useEffect(() => { localStorage.setItem('weightUnit', weightUnit); }, [weightUnit]);

            // ── Reminder engine: checks every 30s while the app is open ──
            useEffect(() => {
                if (!notificationsEnabled || habits.length === 0) return;
                const tick = () => {
                    const now = new Date();
                    const hhmm = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
                    const day = now.getDay();
                    habits.forEach(h => {
                        if (h.remindersOn === false) return;
                        if (!isScheduledOn(h, day)) return;
                        if (h.reminderTime !== hhmm) return;
                        if (completions[today]?.[h.id]) return;
                        const key = `${today}-${h.id}`;
                        if (firedReminders.current[key]) return;
                        firedReminders.current[key] = true;
                        showNotification('Habit reminder', `Time to: ${h.name}`);
                    });
                };
                const interval = setInterval(tick, 30000);
                tick();
                return () => clearInterval(interval);
            }, [notificationsEnabled, habits, completions]);

            const showNotification = (title, body) => {
                if (!('Notification' in window) || Notification.permission !== 'granted') return;
                if (navigator.serviceWorker?.ready) {
                    navigator.serviceWorker.ready.then(reg => reg.showNotification(title, { body, icon: '/icon-192.png', badge: '/icon-192.png', tag: body }))
                        .catch(() => new Notification(title, { body }));
                } else new Notification(title, { body });
            };
            const requestNotificationPermission = async () => {
                if (!('Notification' in window)) { setToast('Notifications are not supported in this browser'); return; }
                const p = await Notification.requestPermission();
                setNotificationsEnabled(p === 'granted');
                setToast(p === 'granted' ? 'Reminders are on' : 'Notifications were blocked — enable them in browser settings');
            };
            useEffect(() => { if (toast) { const t = setTimeout(() => setToast(''), 3000); return () => clearTimeout(t); } }, [toast]);

            // ── DATA ──
            const loadUserData = async (userId) => {
                try {
                    const [hs, cs, ns, ws, rs, el, prof] = await Promise.all([
                        db.collection(`users/${userId}/habits`).get(),
                        db.collection(`users/${userId}/completions`).get(),
                        db.collection(`users/${userId}/notes`).orderBy('createdAt', 'desc').get().catch(() => ({ docs: [] })),
                        db.collection(`users/${userId}/weight`).orderBy('date', 'asc').get().catch(() => ({ docs: [] })),
                        db.collection(`users/${userId}/routines`).get().catch(() => ({ docs: [] })),
                        db.collection(`users/${userId}/exerciseLog`).get().catch(() => ({ docs: [] })),
                        db.collection(`users/${userId}/profile`).doc('settings').get().catch(() => null),
                    ]);
                    const habitsData = hs.docs.map(d => ({ id: d.id, ...d.data() }));
                    setHabits(habitsData);
                    const cd = {}; cs.docs.forEach(d => cd[d.id] = d.data()); setCompletions(cd);
                    setNotes(ns.docs.map(d => ({ id: d.id, ...d.data() })));
                    setWeightEntries(ws.docs.map(d => ({ id: d.id, ...d.data() })));
                    setCustomRoutines(rs.docs.map(d => ({ id: d.id, ...d.data() })));
                    const eld = {}; el.docs.forEach(d => eld[d.id] = d.data()); setExerciseLog(eld);
                    if (prof?.exists) {
                        const p = prof.data();
                        if (p.goalWeight) setGoalWeight(p.goalWeight);
                        if (p.weightUnit) setWeightUnit(p.weightUnit);
                    }
                    if (habitsData.length === 0) await createSampleHabits(userId);
                } catch (e) { console.error('Error loading data:', e); }
            };
            const createSampleHabits = async (userId) => {
                const samples = [
                    { name: 'Drink 8 glasses of water', reminderTime: '09:00', category: 'health' },
                    { name: 'Exercise for 30 minutes', reminderTime: '07:00', category: 'health' },
                    { name: 'Read for 20 minutes', reminderTime: '21:00', category: 'wellness' },
                    { name: 'Meditate for 10 minutes', reminderTime: '08:00', category: 'wellness' },
                    { name: 'Review daily tasks', reminderTime: '09:30', category: 'productivity' }
                ];
                for (const h of samples) await db.collection(`users/${userId}/habits`).add({ ...h, days: [0,1,2,3,4,5,6], remindersOn: true });
                loadUserData(userId);
            };

            const saveHabit = async () => {
                if (!habitForm.name.trim() || !user) return;
                const data = { name: habitForm.name.trim(), reminderTime: habitForm.reminderTime, category: habitForm.category, days: habitForm.days, remindersOn: habitForm.remindersOn };
                try {
                    if (editingHabit) await db.collection(`users/${user.uid}/habits`).doc(editingHabit).update(data);
                    else await db.collection(`users/${user.uid}/habits`).add({ ...data, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                    setShowAddForm(false); setEditingHabit(null);
                    setHabitForm({ name: '', reminderTime: '09:00', category: 'health', days: [0,1,2,3,4,5,6], remindersOn: true });
                    loadUserData(user.uid);
                } catch (e) { console.error(e); }
            };
            const removeHabit = async (id) => {
                if (!user || !confirm('Delete this habit? Its history stays in your completion records.')) return;
                try { await db.collection(`users/${user.uid}/habits`).doc(id).delete(); loadUserData(user.uid); } catch (e) { console.error(e); }
            };
            const toggleHabit = async (habitId, date = today) => {
                if (!user) return;
                const dc = completions[date] || {};
                const newStatus = !dc[habitId];
                const updated = { ...dc, [habitId]: newStatus };
                setCompletions(prev => ({ ...prev, [date]: updated })); // optimistic
                try { await db.collection(`users/${user.uid}/completions`).doc(date).set(updated); }
                catch (e) { console.error(e); loadUserData(user.uid); }
            };

            const completeRoutine = async (routineId) => {
                if (!user) return;
                const dc = exerciseLog[today] || {};
                const updated = { ...dc, [routineId]: true };
                setExerciseLog(prev => ({ ...prev, [today]: updated }));
                setPlayingRoutine(false); setActiveRoutine(null); setCurrentView('exercises');
                setToast('Routine complete — logged for today 🔥');
                try { await db.collection(`users/${user.uid}/exerciseLog`).doc(today).set(updated); } catch (e) { console.error(e); }
            };
            const routineStreak = (routineId) => {
                let streak = 0; const d = new Date();
                if (!exerciseLog[today]?.[routineId]) d.setDate(d.getDate() - 1);
                for (let i = 0; i < 730; i++) {
                    if (exerciseLog[localDateStr(d)]?.[routineId]) streak++; else break;
                    d.setDate(d.getDate() - 1);
                }
                return streak;
            };
            const saveCustomRoutine = async () => {
                if (!routineForm.name.trim() || !user) return;
                const exercises = routineForm.exercisesText.split('\n').map(l => l.trim()).filter(Boolean).map(line => {
                    const [name, reps] = line.split('|').map(s => s.trim());
                    return { name: name || 'Exercise', sets: 3, reps: reps || '10 reps', rest: 45, workSeconds: 60, position: '', movement: '', why: '' };
                });
                if (exercises.length === 0) return;
                try {
                    await db.collection(`users/${user.uid}/routines`).add({
                        name: routineForm.name.trim(), emoji: routineForm.emoji || '🏋️', duration: `~${exercises.length * 3} min`,
                        schedule: 'Your schedule', intro: '', notes: [], exercises, results: '',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    setShowRoutineForm(false); setRoutineForm({ name: '', emoji: '🏋️', exercisesText: '' });
                    loadUserData(user.uid);
                } catch (e) { console.error(e); }
            };
            const deleteCustomRoutine = async (id) => {
                if (!user || !confirm('Delete this routine?')) return;
                try { await db.collection(`users/${user.uid}/routines`).doc(id).delete(); loadUserData(user.uid); } catch (e) { console.error(e); }
            };

            const addNote = async () => {
                if (!newNoteText.trim() || !user) return;
                try {
                    await db.collection(`users/${user.uid}/notes`).add({ title: newNoteTitle.trim() || 'Untitled', text: newNoteText.trim(), createdAt: firebase.firestore.FieldValue.serverTimestamp(), date: today });
                    setNewNoteTitle(''); setNewNoteText(''); setShowNoteForm(false); loadUserData(user.uid);
                } catch (e) { console.error(e); }
            };
            const deleteNote = async (id) => { if (!user) return; try { await db.collection(`users/${user.uid}/notes`).doc(id).delete(); loadUserData(user.uid); } catch (e) { console.error(e); } };
            const addWeightEntry = async () => {
                if (!newWeight || isNaN(newWeight) || !user) return;
                try {
                    await db.collection(`users/${user.uid}/weight`).add({ weight: parseFloat(newWeight), unit: weightUnit, date: newWeightDate, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                    setNewWeight(''); setShowWeightForm(false); loadUserData(user.uid);
                } catch (e) { console.error(e); }
            };
            const deleteWeightEntry = async (id) => { if (!user) return; try { await db.collection(`users/${user.uid}/weight`).doc(id).delete(); loadUserData(user.uid); } catch (e) { console.error(e); } };
            const saveGoalWeight = async () => {
                if (!goalWeightInput || isNaN(goalWeightInput) || !user) return;
                try {
                    await db.collection(`users/${user.uid}/profile`).doc('settings').set({ goalWeight: parseFloat(goalWeightInput), weightUnit }, { merge: true });
                    setGoalWeight(parseFloat(goalWeightInput)); setGoalWeightInput(''); setShowGoalForm(false);
                } catch (e) { console.error(e); }
            };

            // ── EXPORT ──
            const exportJSON = () => {
                const backup = { exportedAt: new Date().toISOString(), app: 'DailyFire', habits, completions, exerciseLog, customRoutines, notes, weightEntries, goalWeight, weightUnit };
                downloadFile(`dailyfire-backup-${today}.json`, JSON.stringify(backup, null, 2), 'application/json');
                setToast('Backup downloaded');
            };
            const exportCompletionsCSV = () => {
                const rows = [['date', 'habit', 'category', 'completed']];
                const habitMap = {}; habits.forEach(h => habitMap[h.id] = h);
                Object.keys(completions).sort().forEach(date => {
                    Object.entries(completions[date]).forEach(([hid, done]) => {
                        const h = habitMap[hid];
                        rows.push([date, h ? h.name : hid, h ? h.category : '', done ? 'yes' : 'no']);
                    });
                });
                Object.keys(exerciseLog).sort().forEach(date => {
                    Object.entries(exerciseLog[date]).forEach(([rid, done]) => {
                        const r = allRoutines.find(r => r.id === rid);
                        rows.push([date, r ? r.name : rid, 'exercise routine', done ? 'yes' : 'no']);
                    });
                });
                downloadFile(`dailyfire-completions-${today}.csv`, rows.map(r => r.map(csvEscape).join(',')).join('\n'), 'text/csv');
                setToast('Completions CSV downloaded');
            };
            const exportWeightCSV = () => {
                const rows = [['date', 'weight', 'unit'], ...weightEntries.map(e => [e.date, e.weight, e.unit || weightUnit])];
                downloadFile(`dailyfire-weight-${today}.csv`, rows.map(r => r.map(csvEscape).join(',')).join('\n'), 'text/csv');
                setToast('Weight CSV downloaded');
            };

            const signOut = () => { auth.signOut(); setHabits([]); setCompletions({}); setNotes([]); setWeightEntries([]); setExerciseLog({}); setCustomRoutines([]); };

            const getMonthData = () => {
                const days = new Date(selectedYear, selectedMonth + 1, 0).getDate();
                return Array.from({ length: days }, (_, i) => localDateStr(new Date(selectedYear, selectedMonth, i + 1)));
            };
            const getWeeklyData = () => {
                const weekDates = [];
                for (let i = 6; i >= 0; i--) { const d = new Date(); d.setDate(d.getDate() - i); weekDates.push(localDateStr(d)); }
                return { weekDates, rows: habits.map(h => ({
                    name: h.name, category: h.category,
                    data: weekDates.map(date => completions[date]?.[h.id] ? 1 : 0),
                    total: weekDates.reduce((s, date) => s + (completions[date]?.[h.id] ? 1 : 0), 0)
                })) };
            };

            // ── THEME ──
            const bgClass = darkMode ? 'bg-gray-900' : 'bg-gradient-to-br from-purple-50 to-blue-50';
            const cardBg = darkMode ? 'bg-gray-800' : 'bg-white';
            const textPrimary = darkMode ? 'text-gray-100' : 'text-gray-800';
            const textSecondary = darkMode ? 'text-gray-400' : 'text-gray-600';
            const border = darkMode ? 'border-gray-700' : 'border-gray-200';
            const inputClass = `w-full px-3 py-2 border ${border} rounded-lg focus:outline-none focus:border-purple-500 ${darkMode ? 'bg-gray-700 text-white' : 'bg-white'}`;

            if (loading) return (
                <div className={`flex items-center justify-center min-h-screen ${bgClass}`}>
                    <div className="text-center"><div className="animate-spin rounded-full h-12 w-12 border-b-2 border-purple-500 mx-auto"></div><p className={`mt-4 ${textSecondary}`}>Loading...</p></div>
                </div>
            );
            if (!user) return <LoginScreen darkMode={darkMode} setDarkMode={setDarkMode} />;

            const todayCompletions = completions[today] || {};
            const todayDay = new Date().getDay();
            const todaysHabits = habits.filter(h => isScheduledOn(h, todayDay));
            const todayStats = {
                completed: todaysHabits.filter(h => todayCompletions[h.id]).length,
                total: todaysHabits.length,
            };
            todayStats.rate = todayStats.total ? Math.round(todayStats.completed / todayStats.total * 100) : 0;

            const OfflineBanner = () => isOffline ? <div className="bg-yellow-500 text-white text-xs text-center py-1.5 font-medium">📴 Offline — changes will sync when you reconnect</div> : null;
            const Toast = () => toast ? <div className="fixed bottom-20 left-1/2 -translate-x-1/2 bg-gray-900 text-white text-sm px-4 py-2 rounded-full shadow-lg z-50">{toast}</div> : null;
            const Header = ({ title }) => (
                <div className={`${cardBg} shadow-lg sticky top-0 z-10`}>
                    <div className={`flex items-center justify-between p-4 border-b ${border}`}>
                        <button onClick={() => { setCurrentView('today'); setActiveRoutine(null); setPlayingRoutine(false); }} className="text-purple-600 font-medium">← Back</button>
                        <h1 className={`text-xl font-bold ${textPrimary}`}>{title}</h1>
                        <button onClick={() => setDarkMode(!darkMode)} className={`p-2 rounded-full ${darkMode ? 'bg-gray-700' : 'bg-gray-100'}`}>{darkMode ? <Sun /> : <Moon />}</button>
                    </div>
                </div>
            );
            const BottomNav = () => {
                const items = [
                    { id: 'today', label: 'Today', icon: <Target /> },
                    { id: 'exercises', label: 'Exercise', icon: <Dumbbell /> },
                    { id: 'analytics', label: 'Stats', icon: <BarChart3 /> },
                    { id: 'monthly', label: 'Calendar', icon: <CalIcon /> },
                    { id: 'settings', label: 'More', icon: <Settings /> },
                ];
                return (
                    <div className={`fixed bottom-0 left-0 right-0 ${cardBg} border-t ${border} z-20`} style={{ paddingBottom: 'env(safe-area-inset-bottom)' }}>
                        <div className="max-w-md mx-auto flex">
                            {items.map(it => (
                                <button key={it.id} onClick={() => { setCurrentView(it.id); setActiveRoutine(null); setPlayingRoutine(false); }}
                                    className={`flex-1 flex flex-col items-center py-2 text-xs ${currentView === it.id ? 'text-purple-500' : textSecondary}`}>
                                    {it.icon}<span className="mt-0.5">{it.label}</span>
                                </button>
                            ))}
                        </div>
                    </div>
                );
            };
            const Shell = ({ title, children, wide }) => (
                <div className={`${wide ? 'max-w-4xl' : 'max-w-md'} mx-auto ${bgClass} min-h-screen pb-20`}>
                    <OfflineBanner /><Header title={title} />{children}<BottomNav /><Toast />
                </div>
            );

            // ── EXERCISES: routine player ──
            if (activeRoutine && playingRoutine) {
                const r = allRoutines.find(r => r.id === activeRoutine);
                return <Shell title={r.name}><RoutinePlayer routine={r} dark={darkMode} onFinish={() => completeRoutine(r.id)} onExit={() => setPlayingRoutine(false)} /></Shell>;
            }
            // ── EXERCISES: routine detail ──
            if (activeRoutine) {
                const r = allRoutines.find(r => r.id === activeRoutine);
                if (!r) { setActiveRoutine(null); return null; }
                const doneToday = exerciseLog[today]?.[r.id];
                return (
                    <Shell title={r.name}>
                        <div className="p-4 space-y-4">
                            <div className={`${cardBg} rounded-2xl p-4 border ${border}`}>
                                <div className="flex items-center justify-between mb-2">
                                    <span className="text-3xl">{r.emoji}</span>
                                    <div className="flex items-center space-x-1 text-purple-500 text-sm font-medium"><Flame /><span>{routineStreak(r.id)} day streak</span></div>
                                </div>
                                <p className={`text-sm ${textSecondary}`}>{r.duration} · {r.schedule}</p>
                                {r.intro && <p className={`text-sm ${textSecondary} mt-2 leading-relaxed`}>{r.intro}</p>}
                                <div className="flex space-x-2 mt-4">
                                    <button onClick={() => setPlayingRoutine(true)} className="flex-1 bg-purple-500 hover:bg-purple-600 text-white py-3 rounded-xl font-semibold">▶ Start guided session</button>
                                    <button onClick={() => doneToday ? null : completeRoutine(r.id)} disabled={doneToday}
                                        className={`px-4 py-3 rounded-xl font-medium border ${doneToday ? 'bg-green-500 text-white border-green-500' : `${border} ${textSecondary}`}`}>
                                        {doneToday ? '✓ Done today' : 'Mark done'}
                                    </button>
                                </div>
                            </div>
                            {r.exercises.map((ex, i) => (
                                <div key={i} className={`${cardBg} rounded-2xl p-4 border ${border}`}>
                                    <div className="flex justify-between items-start">
                                        <h3 className={`font-semibold ${textPrimary}`}>{i + 1}. {ex.name}</h3>
                                        <span className="text-xs text-purple-500 font-medium whitespace-nowrap ml-2">{ex.sets} × {ex.reps}</span>
                                    </div>
                                    {ex.rest > 0 && <p className={`text-xs ${textSecondary} mt-0.5`}>Rest {ex.rest}s between sets</p>}
                                    {ex.position && <p className={`text-sm ${textSecondary} mt-2`}><span className={`font-medium ${textPrimary}`}>Position: </span>{ex.position}</p>}
                                    {ex.movement && <p className={`text-sm ${textSecondary} mt-1`}><span className={`font-medium ${textPrimary}`}>Movement: </span>{ex.movement}</p>}
                                    {ex.why && <p className={`text-sm ${textSecondary} mt-1 italic`}>{ex.why}</p>}
                                </div>
                            ))}
                            {r.notes?.length > 0 && (
                                <div className={`${cardBg} rounded-2xl p-4 border ${border}`}>
                                    <h3 className={`font-semibold ${textPrimary} mb-2`}>Important notes</h3>
                                    {r.notes.map((n, i) => <p key={i} className={`text-sm ${textSecondary} mb-1`}>• {n}</p>)}
                                </div>
                            )}
                            {r.results && (
                                <div className={`${cardBg} rounded-2xl p-4 border ${darkMode ? 'border-purple-700' : 'border-purple-200'}`}>
                                    <h3 className={`font-semibold ${textPrimary} mb-1`}>What to expect</h3>
                                    <p className={`text-sm ${textSecondary}`}>{r.results}</p>
                                </div>
                            )}
                        </div>
                    </Shell>
                );
            }
            // ── EXERCISES LIST ──
            if (currentView === 'exercises') {
                return (
                    <Shell title="🏋️ Exercises">
                        <div className="p-4 space-y-4">
                            {allRoutines.map(r => {
                                const doneToday = exerciseLog[today]?.[r.id];
                                return (
                                    <div key={r.id} className={`${cardBg} rounded-2xl p-4 border ${doneToday ? (darkMode ? 'border-green-700' : 'border-green-300') : border} shadow-sm`}>
                                        <button onClick={() => setActiveRoutine(r.id)} className="w-full text-left">
                                            <div className="flex items-center justify-between">
                                                <div className="flex items-center space-x-3">
                                                    <span className="text-3xl">{r.emoji}</span>
                                                    <div>
                                                        <h3 className={`font-semibold ${textPrimary}`}>{r.name}</h3>
                                                        <p className={`text-xs ${textSecondary}`}>{r.duration} · {r.exercises.length} exercises{doneToday ? ' · ✓ done today' : ''}</p>
                                                        <div className="flex items-center space-x-1 text-purple-500 text-xs font-medium mt-0.5"><Flame /><span>{routineStreak(r.id)} day streak</span></div>
                                                    </div>
                                                </div>
                                                <ChevronRight />
                                            </div>
                                        </button>
                                        {!r.builtin && <button onClick={() => deleteCustomRoutine(r.id)} className={`text-xs ${textSecondary} hover:text-red-500 mt-2`}>Delete routine</button>}
                                    </div>
                                );
                            })}
                            {showRoutineForm ? (
                                <div className={`${cardBg} rounded-2xl p-4 border ${border} space-y-3`}>
                                    <input type="text" placeholder="Routine name" value={routineForm.name} onChange={e => setRoutineForm({ ...routineForm, name: e.target.value })} className={inputClass} />
                                    <input type="text" placeholder="Emoji (optional)" value={routineForm.emoji} onChange={e => setRoutineForm({ ...routineForm, emoji: e.target.value })} className={inputClass} />
                                    <textarea rows={5} placeholder={"One exercise per line:\nPush-ups | 15 reps\nPlank | 60 seconds"} value={routineForm.exercisesText} onChange={e => setRoutineForm({ ...routineForm, exercisesText: e.target.value })} className={`${inputClass} resize-none`} />
                                    <div className="flex space-x-2">
                                        <button onClick={saveCustomRoutine} className="flex-1 bg-purple-500 text-white py-2 rounded-lg font-medium">Save routine</button>
                                        <button onClick={() => setShowRoutineForm(false)} className={`px-4 py-2 ${textSecondary}`}>Cancel</button>
                                    </div>
                                </div>
                            ) : (
                                <button onClick={() => setShowRoutineForm(true)} className={`w-full ${cardBg} border-2 border-dashed ${darkMode ? 'border-gray-600 text-gray-400 hover:border-purple-400 hover:text-purple-400' : 'border-gray-300 text-gray-500 hover:border-purple-300 hover:text-purple-500'} rounded-2xl p-4 flex items-center justify-center space-x-2`}>
                                    <Plus /><span className="font-medium">Add custom routine</span>
                                </button>
                            )}
                        </div>
                    </Shell>
                );
            }

            // ── SETTINGS / EXPORT ──
            if (currentView === 'settings') {
                return (
                    <Shell title="⚙️ Settings">
                        <div className="p-4 space-y-4">
                            <div className={`${cardBg} rounded-2xl p-4 border ${border}`}>
                                <h3 className={`font-semibold ${textPrimary} mb-1`}>Account</h3>
                                <p className={`text-sm ${textSecondary}`}>{user.displayName || user.email || 'Signed in'}</p>
                                <button onClick={signOut} className={`mt-3 flex items-center space-x-2 text-sm ${textSecondary} hover:text-red-500`}><LogOut /><span>Sign out</span></button>
                            </div>
                            <div className={`${cardBg} rounded-2xl p-4 border ${border}`}>
                                <h3 className={`font-semibold ${textPrimary} mb-2`}>Reminders & notifications</h3>
                                <p className={`text-sm ${textSecondary} mb-3`}>{notificationsEnabled ? 'Notifications are on. Each habit fires at its reminder time on its scheduled days, while the app is open or installed.' : 'Turn on notifications to get habit reminders at the times you set.'}</p>
                                <button onClick={requestNotificationPermission} className={`px-4 py-2 rounded-lg font-medium ${notificationsEnabled ? 'bg-green-500 text-white' : 'bg-purple-500 text-white'}`}>
                                    {notificationsEnabled ? '✓ Notifications enabled' : 'Enable notifications'}
                                </button>
                                <p className={`text-xs ${textSecondary} mt-2`}>Set each habit's reminder time and days by tapping the pencil icon on a habit.</p>
                            </div>
                            <div className={`${cardBg} rounded-2xl p-4 border ${border}`}>
                                <h3 className={`font-semibold ${textPrimary} mb-2`}>Export your data</h3>
                                <div className="space-y-2">
                                    <button onClick={exportJSON} className={`w-full flex items-center space-x-2 px-4 py-3 rounded-xl border ${border} ${textPrimary} hover:border-purple-400`}><Download /><span>Full backup (JSON)</span></button>
                                    <button onClick={exportCompletionsCSV} className={`w-full flex items-center space-x-2 px-4 py-3 rounded-xl border ${border} ${textPrimary} hover:border-purple-400`}><Download /><span>Habit & exercise history (CSV)</span></button>
                                    <button onClick={exportWeightCSV} className={`w-full flex items-center space-x-2 px-4 py-3 rounded-xl border ${border} ${textPrimary} hover:border-purple-400`}><Download /><span>Weight log (CSV)</span></button>
                                </div>
                            </div>
                            <div className={`${cardBg} rounded-2xl p-4 border ${border}`}>
                                <h3 className={`font-semibold ${textPrimary} mb-2`}>Other sections</h3>
                                <button onClick={() => setCurrentView('notes')} className={`w-full flex items-center justify-between px-4 py-3 rounded-xl border ${border} ${textPrimary} mb-2`}><span className="flex items-center space-x-2"><NoteIcon /><span>Notes</span></span><ChevronRight /></button>
                                <button onClick={() => setCurrentView('weight')} className={`w-full flex items-center justify-between px-4 py-3 rounded-xl border ${border} ${textPrimary}`}><span className="flex items-center space-x-2"><ScaleIcon /><span>Weight tracking</span></span><ChevronRight /></button>
                            </div>
                            <div className={`${cardBg} rounded-2xl p-4 border ${border}`}>
                                <h3 className={`font-semibold ${textPrimary} mb-1`}>Install as an app</h3>
                                <p className={`text-sm ${textSecondary}`}>Android (Chrome): menu → "Add to Home screen". iPhone (Safari): Share → "Add to Home Screen". DailyFire then runs full-screen and works offline.</p>
                            </div>
                        </div>
                    </Shell>
                );
            }

            // ── NOTES ──
            if (currentView === 'notes') {
                return (
                    <Shell title="📝 Notes">
                        <div className="p-4 space-y-4">
                            {showNoteForm ? (
                                <div className={`${cardBg} rounded-2xl p-4 border ${border} space-y-3`}>
                                    <input type="text" placeholder="Title (optional)" value={newNoteTitle} onChange={e => setNewNoteTitle(e.target.value)} className={inputClass} />
                                    <textarea placeholder="Write your note..." value={newNoteText} onChange={e => setNewNoteText(e.target.value)} rows={5} className={`${inputClass} resize-none`} />
                                    <div className="flex space-x-2">
                                        <button onClick={addNote} className="flex-1 bg-purple-500 text-white py-2 rounded-lg font-medium">Save note</button>
                                        <button onClick={() => { setShowNoteForm(false); setNewNoteTitle(''); setNewNoteText(''); }} className={`px-4 py-2 ${textSecondary}`}>Cancel</button>
                                    </div>
                                </div>
                            ) : (
                                <button onClick={() => setShowNoteForm(true)} className={`w-full ${cardBg} border-2 border-dashed ${darkMode ? 'border-gray-600 text-gray-400' : 'border-gray-300 text-gray-500'} rounded-2xl p-4 flex items-center justify-center space-x-2 hover:border-purple-400 hover:text-purple-500 transition-colors`}>
                                    <Plus /><span className="font-medium">Add new note</span>
                                </button>
                            )}
                            {notes.length === 0 && !showNoteForm && <div className={`text-center py-12 ${textSecondary}`}><div className="text-5xl mb-3">📓</div><p className="font-medium">No notes yet</p></div>}
                            {notes.map(note => (
                                <div key={note.id} className={`${cardBg} rounded-2xl p-4 border ${border}`}>
                                    <div className="flex items-start justify-between mb-2">
                                        <div><h3 className={`font-semibold ${textPrimary}`}>{note.title}</h3><p className={`text-xs ${textSecondary} mt-0.5`}>{note.date}</p></div>
                                        <button onClick={() => deleteNote(note.id)} className={`${textSecondary} hover:text-red-500 p-1 ml-2`}><Trash /></button>
                                    </div>
                                    <p className={`text-sm ${textSecondary} leading-relaxed whitespace-pre-wrap`}>{note.text}</p>
                                </div>
                            ))}
                        </div>
                    </Shell>
                );
            }

            // ── WEIGHT ──
            if (currentView === 'weight') {
                const sorted = [...weightEntries].sort((a, b) => a.date.localeCompare(b.date));
                const latest = sorted[sorted.length - 1], first = sorted[0];
                const totalChange = latest && first && latest !== first ? (latest.weight - first.weight).toFixed(1) : null;
                const chartEntries = sorted.slice(-12);
                const W = 320, H = 100, P = 10;
                let sparkline = null;
                if (chartEntries.length >= 2) {
                    const ws = chartEntries.map(e => e.weight);
                    const minW = Math.min(...ws) - 1, maxW = Math.max(...ws) + 1;
                    const points = chartEntries.map((e, i) => `${P + i / (chartEntries.length - 1) * (W - P * 2)},${H - P - (e.weight - minW) / (maxW - minW) * (H - P * 2)}`);
                    const goalY = goalWeight ? H - P - (goalWeight - minW) / (maxW - minW) * (H - P * 2) : null;
                    sparkline = { points, goalY };
                }
                return (
                    <Shell title="⚖️ Weight">
                        <div className="p-4 space-y-4">
                            <div className="grid grid-cols-3 gap-3">
                                <div className={`${cardBg} rounded-2xl p-3 border ${border} text-center`}><p className={`text-xs ${textSecondary} mb-1`}>Current</p><p className={`text-xl font-bold ${textPrimary}`}>{latest ? latest.weight : '—'}</p><p className={`text-xs ${textSecondary}`}>{weightUnit}</p></div>
                                <div className={`${cardBg} rounded-2xl p-3 border ${border} text-center`}><p className={`text-xs ${textSecondary} mb-1`}>Goal</p><p className="text-xl font-bold text-purple-500">{goalWeight || '—'}</p><p className={`text-xs ${textSecondary}`}>{goalWeight ? weightUnit : 'not set'}</p></div>
                                <div className={`${cardBg} rounded-2xl p-3 border ${border} text-center`}>
                                    <p className={`text-xs ${textSecondary} mb-1`}>Change</p>
                                    {totalChange !== null ? (
                                        <div className={`flex items-center justify-center space-x-1 ${parseFloat(totalChange) < 0 ? 'text-green-500' : 'text-red-400'}`}>{parseFloat(totalChange) < 0 ? <TrendDown /> : <TrendUp />}<p className="text-xl font-bold">{Math.abs(totalChange)}</p></div>
                                    ) : <p className={`text-xl font-bold ${textPrimary}`}>—</p>}
                                    <p className={`text-xs ${textSecondary}`}>{weightUnit} total</p>
                                </div>
                            </div>
                            {sparkline && (
                                <div className={`${cardBg} rounded-2xl p-4 border ${border}`}>
                                    <h3 className={`text-sm font-semibold ${textPrimary} mb-3`}>Last {chartEntries.length} entries</h3>
                                    <svg width="100%" viewBox={`0 0 ${W} ${H}`}>
                                        <defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#8b5cf6" stopOpacity="0.3"/><stop offset="100%" stopColor="#8b5cf6" stopOpacity="0"/></linearGradient></defs>
                                        {sparkline.goalY !== null && <line x1={P} y1={sparkline.goalY} x2={W - P} y2={sparkline.goalY} stroke="#a855f7" strokeWidth="1.5" strokeDasharray="4,3" opacity="0.7" />}
                                        <polyline fill="url(#wg)" stroke="none" points={`${P},${H - P} ${sparkline.points.join(' ')} ${W - P},${H - P}`} />
                                        <polyline fill="none" stroke="#8b5cf6" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" points={sparkline.points.join(' ')} />
                                        {sparkline.points.map((pt, i) => { const [x, y] = pt.split(','); return <circle key={i} cx={x} cy={y} r="4" fill="#8b5cf6" stroke="white" strokeWidth="2" />; })}
                                    </svg>
                                    <div className="flex justify-between mt-1">
                                        <span className={`text-xs ${textSecondary}`}>{chartEntries[0]?.date}</span>
                                        {goalWeight && <span className="text-xs text-purple-500">— goal</span>}
                                        <span className={`text-xs ${textSecondary}`}>{chartEntries[chartEntries.length - 1]?.date}</span>
                                    </div>
                                </div>
                            )}
                            <div className="flex space-x-2">
                                <div className={`flex ${cardBg} rounded-xl border ${border} overflow-hidden flex-1`}>
                                    {['kg', 'lbs'].map(u => <button key={u} onClick={() => setWeightUnit(u)} className={`flex-1 py-2 text-sm font-medium ${weightUnit === u ? 'bg-purple-500 text-white' : textSecondary}`}>{u}</button>)}
                                </div>
                                <button onClick={() => setShowGoalForm(!showGoalForm)} className={`px-4 py-2 rounded-xl border ${border} text-sm font-medium ${textSecondary} ${cardBg} hover:border-purple-400 hover:text-purple-500`}>{goalWeight ? `Goal: ${goalWeight}${weightUnit}` : 'Set goal'}</button>
                            </div>
                            {showGoalForm && (
                                <div className={`${cardBg} rounded-2xl p-4 border ${border}`}>
                                    <p className={`text-sm font-medium ${textPrimary} mb-2`}>Set goal weight ({weightUnit})</p>
                                    <div className="flex space-x-2">
                                        <input type="number" placeholder="e.g. 70" value={goalWeightInput} onChange={e => setGoalWeightInput(e.target.value)} className={`${inputClass} flex-1`} />
                                        <button onClick={saveGoalWeight} className="bg-purple-500 text-white px-4 rounded-lg font-medium">Save</button>
                                    </div>
                                </div>
                            )}
                            {showWeightForm ? (
                                <div className={`${cardBg} rounded-2xl p-4 border ${border} space-y-3`}>
                                    <div className="flex space-x-2">
                                        <input type="number" step="0.1" placeholder={`Weight (${weightUnit})`} value={newWeight} onChange={e => setNewWeight(e.target.value)} className={`${inputClass} flex-1`} />
                                        <input type="date" value={newWeightDate} onChange={e => setNewWeightDate(e.target.value)} className={`${inputClass} flex-1`} />
                                    </div>
                                    <div className="flex space-x-2">
                                        <button onClick={addWeightEntry} className="flex-1 bg-purple-500 text-white py-2 rounded-lg font-medium">Save entry</button>
                                        <button onClick={() => { setShowWeightForm(false); setNewWeight(''); }} className={`px-4 py-2 ${textSecondary}`}>Cancel</button>
                                    </div>
                                </div>
                            ) : (
                                <button onClick={() => setShowWeightForm(true)} className={`w-full ${cardBg} border-2 border-dashed ${darkMode ? 'border-gray-600 text-gray-400' : 'border-gray-300 text-gray-500'} rounded-2xl p-4 flex items-center justify-center space-x-2 hover:border-purple-400 hover:text-purple-500`}>
                                    <Plus /><span className="font-medium">Log weight</span>
                                </button>
                            )}
                            {sorted.length > 0 && (
                                <div className={`${cardBg} rounded-2xl p-4 border ${border}`}>
                                    <h3 className={`text-sm font-semibold ${textPrimary} mb-3`}>History</h3>
                                    <div className="space-y-2 max-h-64 overflow-y-auto">
                                        {[...sorted].reverse().map((entry, idx) => {
                                            const prev = sorted[sorted.length - 2 - idx];
                                            const diff = prev ? (entry.weight - prev.weight).toFixed(1) : null;
                                            return (
                                                <div key={entry.id} className={`flex items-center justify-between py-2 border-b ${border} last:border-b-0`}>
                                                    <div>
                                                        <span className={`font-semibold ${textPrimary}`}>{entry.weight} {entry.unit || weightUnit}</span>
                                                        {diff !== null && <span className={`text-xs ml-2 ${parseFloat(diff) < 0 ? 'text-green-500' : 'text-red-400'}`}>{parseFloat(diff) > 0 ? '+' : ''}{diff}</span>}
                                                    </div>
                                                    <div className="flex items-center space-x-3">
                                                        <span className={`text-xs ${textSecondary}`}>{entry.date}</span>
                                                        <button onClick={() => deleteWeightEntry(entry.id)} className={`${textSecondary} hover:text-red-500`}><Trash /></button>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}
                        </div>
                    </Shell>
                );
            }

            // ── MONTHLY ──
            if (currentView === 'monthly') {
                const monthDates = getMonthData();
                const monthName = new Date(selectedYear, selectedMonth).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
                const firstDayOfMonth = new Date(selectedYear, selectedMonth, 1).getDay();
                return (
                    <Shell title="Monthly View" wide>
                        <div className="p-4">
                            <div className={`${cardBg} rounded-2xl p-4 border ${border}`}>
                                <div className="flex items-center justify-between mb-4">
                                    <button onClick={() => { if (selectedMonth === 0) { setSelectedMonth(11); setSelectedYear(y => y - 1); } else setSelectedMonth(m => m - 1); }} className={`px-4 py-2 rounded-lg ${darkMode ? 'bg-gray-700' : 'bg-gray-100'} ${textPrimary}`}>← Prev</button>
                                    <h2 className={`text-lg font-bold ${textPrimary}`}>{monthName}</h2>
                                    <button onClick={() => { if (selectedMonth === 11) { setSelectedMonth(0); setSelectedYear(y => y + 1); } else setSelectedMonth(m => m + 1); }} className={`px-4 py-2 rounded-lg ${darkMode ? 'bg-gray-700' : 'bg-gray-100'} ${textPrimary}`}>Next →</button>
                                </div>
                                <div className="grid grid-cols-7 gap-2 mb-2">
                                    {DAY_NAMES.map(day => <div key={day} className={`text-center text-xs font-semibold ${textSecondary} py-2`}>{day}</div>)}
                                </div>
                                <div className="grid grid-cols-7 gap-2">
                                    {[...Array(firstDayOfMonth)].map((_, i) => <div key={`e${i}`} className="aspect-square"></div>)}
                                    {monthDates.map(date => {
                                        const dayIdx = new Date(date + 'T12:00:00').getDay();
                                        const scheduled = habits.filter(h => isScheduledOn(h, dayIdx));
                                        const dc = completions[date] || {};
                                        const count = scheduled.filter(h => dc[h.id]).length;
                                        const rate = scheduled.length > 0 ? count / scheduled.length * 100 : 0;
                                        const isToday = date === today;
                                        return (
                                            <div key={date} className={`aspect-square rounded-lg p-1 ${isToday ? 'ring-2 ring-purple-500' : ''} ${rate === 100 && scheduled.length ? 'bg-green-500' : rate >= 75 ? 'bg-green-400' : rate >= 50 ? 'bg-yellow-400' : rate >= 25 ? 'bg-orange-400' : rate > 0 ? 'bg-red-400' : darkMode ? 'bg-gray-700' : 'bg-gray-100'}`}>
                                                <div className={`text-xs font-semibold ${rate > 0 ? 'text-white' : textPrimary}`}>{parseInt(date.slice(8))}</div>
                                                <div className={`text-xs ${rate > 0 ? 'text-white' : textSecondary}`}>{count}/{scheduled.length}</div>
                                                {exerciseLog[date] && Object.values(exerciseLog[date]).some(Boolean) && <div className="text-xs">🏋️</div>}
                                            </div>
                                        );
                                    })}
                                </div>
                                <div className="mt-4 flex items-center justify-center flex-wrap gap-3 text-xs">
                                    <span className="flex items-center space-x-1"><span className="w-3 h-3 bg-green-500 rounded inline-block"></span><span className={textSecondary}>100%</span></span>
                                    <span className="flex items-center space-x-1"><span className="w-3 h-3 bg-yellow-400 rounded inline-block"></span><span className={textSecondary}>50–75%</span></span>
                                    <span className="flex items-center space-x-1"><span className="w-3 h-3 bg-orange-400 rounded inline-block"></span><span className={textSecondary}>25–50%</span></span>
                                    <span className={textSecondary}>🏋️ = exercise routine done</span>
                                </div>
                            </div>
                        </div>
                    </Shell>
                );
            }

            // ── ANALYTICS ──
            if (currentView === 'analytics') {
                const { weekDates, rows } = getWeeklyData();
                const dayHeads = weekDates.map(d => DAY_NAMES[new Date(d + 'T12:00:00').getDay()]);
                const totalPossible = habits.length * 7;
                const totalCompleted = rows.reduce((s, h) => s + h.total, 0);
                const completionRate = totalPossible ? Math.round(totalCompleted / totalPossible * 100) : 0;
                const bestStreak = Math.max(0, ...habits.map(h => computeStreak(h, completions)));
                return (
                    <Shell title="Weekly Analytics">
                        <div className="p-4 space-y-6">
                            <div className="grid grid-cols-2 gap-4">
                                <div className={`${cardBg} rounded-2xl p-4 border ${darkMode ? 'border-purple-700' : 'border-purple-100'}`}>
                                    <div className="flex items-center space-x-2 mb-2"><Target /><span className={`text-sm ${textSecondary}`}>Completion</span></div>
                                    <div className="text-2xl font-bold text-purple-600">{completionRate}%</div>
                                    <div className={`text-xs ${textSecondary}`}>{totalCompleted}/{totalPossible} this week</div>
                                </div>
                                <div className={`${cardBg} rounded-2xl p-4 border ${darkMode ? 'border-green-700' : 'border-green-100'}`}>
                                    <div className="flex items-center space-x-2 mb-2"><Flame /><span className={`text-sm ${textSecondary}`}>Best streak</span></div>
                                    <div className="text-2xl font-bold text-green-600">{bestStreak}</div>
                                    <div className={`text-xs ${textSecondary}`}>days running</div>
                                </div>
                            </div>
                            <div className={`${cardBg} rounded-2xl p-4 border ${border}`}>
                                <h3 className={`text-lg font-semibold ${textPrimary} mb-4`}>By category</h3>
                                <div className="space-y-4">
                                    {Object.keys(CATEGORIES).map(catKey => {
                                        const ch = rows.filter(h => h.category === catKey);
                                        if (ch.length === 0) return null;
                                        const rate = Math.round(ch.reduce((s, h) => s + h.total, 0) / (ch.length * 7) * 100);
                                        return (
                                            <div key={catKey}>
                                                <div className="flex justify-between mb-1">
                                                    <div className="flex items-center space-x-2"><span>{CATEGORIES[catKey].emoji}</span><span className={`text-sm ${textPrimary}`}>{CATEGORIES[catKey].name}</span></div>
                                                    <span className={`text-xs ${textSecondary}`}>{rate}%</span>
                                                </div>
                                                <div className={`w-full ${darkMode ? 'bg-gray-700' : 'bg-gray-200'} rounded-full h-2`}>
                                                    <div className={`bg-${CATEGORIES[catKey].color}-500 h-2 rounded-full`} style={{ width: `${rate}%` }}></div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                            <div className={`${cardBg} rounded-2xl p-4 border ${border}`}>
                                <h3 className={`text-lg font-semibold ${textPrimary} mb-4`}>Individual habits</h3>
                                <div className="space-y-4">
                                    {rows.map((habit, i) => (
                                        <div key={i}>
                                            <div className="flex justify-between mb-1">
                                                <div className="flex items-center space-x-2"><span>{CATEGORIES[habit.category]?.emoji || '📌'}</span><span className={`text-sm ${textPrimary} truncate max-w-48`}>{habit.name}</span></div>
                                                <span className={`text-xs ${textSecondary}`}>{habit.total}/7</span>
                                            </div>
                                            <div className="flex space-x-1 mb-1">
                                                {habit.data.map((c, di) => <div key={di} className={`flex-1 h-8 rounded-lg flex items-center justify-center text-xs font-medium ${c ? 'bg-green-500 text-white' : darkMode ? 'bg-gray-700 text-gray-400' : 'bg-gray-100 text-gray-400'}`}>{dayHeads[di]}</div>)}
                                            </div>
                                            <div className={`w-full ${darkMode ? 'bg-gray-700' : 'bg-gray-200'} rounded-full h-2`}>
                                                <div className="bg-gradient-to-r from-purple-500 to-blue-500 h-2 rounded-full" style={{ width: `${habit.total / 7 * 100}%` }}></div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </Shell>
                );
            }

            // ── TODAY VIEW (default) ──
            const habitsByCategory = {};
            todaysHabits.forEach(h => {
                const cat = h.category || 'other';
                (habitsByCategory[cat] = habitsByCategory[cat] || []).push(h);
            });
            const notScheduledToday = habits.filter(h => !isScheduledOn(h, todayDay));
            const pelvic = allRoutines[0];
            const pelvicDone = exerciseLog[today]?.[pelvic.id];

            const HabitForm = () => (
                <div className={`${cardBg} rounded-2xl p-4 border ${border} space-y-3`}>
                    <input type="text" placeholder="Enter habit name..." value={habitForm.name} onChange={e => setHabitForm({ ...habitForm, name: e.target.value })} className={inputClass} onKeyPress={e => e.key === 'Enter' && saveHabit()} />
                    <select value={habitForm.category} onChange={e => setHabitForm({ ...habitForm, category: e.target.value })} className={inputClass}>
                        {Object.keys(CATEGORIES).map(k => <option key={k} value={k}>{CATEGORIES[k].emoji} {CATEGORIES[k].name}</option>)}
                    </select>
                    <div>
                        <p className={`text-xs font-medium ${textSecondary} mb-1`}>Repeat on</p>
                        <div className="flex space-x-1">
                            {DAY_LABELS.map((d, i) => (
                                <button key={i} onClick={() => setHabitForm(f => ({ ...f, days: f.days.includes(i) ? f.days.filter(x => x !== i) : [...f.days, i] }))}
                                    className={`flex-1 py-2 rounded-lg text-xs font-semibold ${habitForm.days.includes(i) ? 'bg-purple-500 text-white' : darkMode ? 'bg-gray-700 text-gray-400' : 'bg-gray-100 text-gray-500'}`}>{d}</button>
                            ))}
                        </div>
                    </div>
                    <div className="flex items-center space-x-2">
                        <Clock />
                        <input type="time" value={habitForm.reminderTime} onChange={e => setHabitForm({ ...habitForm, reminderTime: e.target.value })} className={`flex-1 ${inputClass}`} />
                        <button onClick={() => setHabitForm(f => ({ ...f, remindersOn: !f.remindersOn }))}
                            className={`px-3 py-2 rounded-lg text-xs font-medium ${habitForm.remindersOn ? 'bg-purple-500 text-white' : darkMode ? 'bg-gray-700 text-gray-400' : 'bg-gray-100 text-gray-500'}`}>
                            {habitForm.remindersOn ? '🔔 Remind' : '🔕 Off'}
                        </button>
                    </div>
                    <div className="flex space-x-2">
                        <button onClick={saveHabit} className="flex-1 bg-purple-500 text-white py-2 rounded-lg font-medium hover:bg-purple-600">{editingHabit ? 'Save changes' : 'Add habit'}</button>
                        <button onClick={() => { setShowAddForm(false); setEditingHabit(null); }} className={`px-4 py-2 ${textSecondary}`}>Cancel</button>
                    </div>
                </div>
            );

            return (
                <div className={`max-w-md mx-auto ${bgClass} min-h-screen pb-20`}>
                    <OfflineBanner />
                    <div className={`${cardBg} shadow-lg`}>
                        <div className="p-4">
                            <div className="flex items-center justify-between mb-4">
                                <div>
                                    <h1 className={`text-2xl font-bold ${textPrimary}`}>🔥 DailyFire</h1>
                                    <p className={`text-sm ${textSecondary}`}>{new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' })}</p>
                                    {(user.displayName || user.email) && <p className={`text-xs ${textSecondary} mt-0.5`}>👤 {user.displayName || user.email}</p>}
                                </div>
                                <div className="flex items-center space-x-1">
                                    <button onClick={requestNotificationPermission} className={`p-2 rounded-full ${notificationsEnabled ? 'bg-purple-100 text-purple-600' : darkMode ? 'bg-gray-700 text-gray-400' : 'bg-gray-100 text-gray-400'}`} title="Notifications"><Bell /></button>
                                    <button onClick={() => setDarkMode(!darkMode)} className={`p-2 rounded-full ${darkMode ? 'bg-gray-700' : 'bg-gray-100'}`}>{darkMode ? <Sun /> : <Moon />}</button>
                                </div>
                            </div>
                            <div className="bg-gradient-to-r from-purple-500 to-blue-500 rounded-2xl p-4 text-white">
                                <div className="flex items-center justify-between">
                                    <div><p className="text-purple-100 text-sm">Today's progress</p><p className="text-2xl font-bold">{todayStats.completed}/{todayStats.total}</p></div>
                                    <div className="text-right"><p className="text-3xl font-bold">{todayStats.rate}%</p><p className="text-purple-100 text-sm">Complete</p></div>
                                </div>
                                <div className="mt-3 bg-white bg-opacity-20 rounded-full h-2">
                                    <div className="bg-white rounded-full h-2 transition-all" style={{ width: `${todayStats.rate}%` }}></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="p-4">
                        {/* Pelvic floor / exercise quick card */}
                        <button onClick={() => { setCurrentView('exercises'); setActiveRoutine(pelvic.id); }}
                            className={`w-full mb-6 ${cardBg} rounded-2xl p-4 border ${pelvicDone ? (darkMode ? 'border-green-700' : 'border-green-300') : (darkMode ? 'border-purple-700' : 'border-purple-200')} shadow-sm text-left`}>
                            <div className="flex items-center justify-between">
                                <div className="flex items-center space-x-3">
                                    <span className="text-3xl">{pelvic.emoji}</span>
                                    <div>
                                        <p className={`font-semibold ${textPrimary}`}>{pelvic.name}</p>
                                        <p className={`text-xs ${textSecondary}`}>{pelvicDone ? '✓ Done today' : `${pelvic.duration} · do it first thing`}</p>
                                    </div>
                                </div>
                                <div className="flex items-center space-x-2">
                                    <span className="flex items-center space-x-1 text-purple-500 text-xs font-medium"><Flame /><span>{routineStreak(pelvic.id)}</span></span>
                                    <ChevronRight />
                                </div>
                            </div>
                        </button>

                        {Object.keys(habitsByCategory).map(catKey => (
                            <div key={catKey} className="mb-6">
                                <div className="flex items-center space-x-2 mb-3">
                                    <span className="text-2xl">{CATEGORIES[catKey]?.emoji || '📌'}</span>
                                    <h3 className={`text-lg font-bold ${textPrimary}`}>{CATEGORIES[catKey]?.name || 'Other'}</h3>
                                    <span className={`text-sm ${textSecondary}`}>({habitsByCategory[catKey].length})</span>
                                </div>
                                <div className="space-y-3">
                                    {habitsByCategory[catKey].map(habit => {
                                        const isCompleted = todayCompletions[habit.id];
                                        const streak = computeStreak(habit, completions);
                                        return (
                                            <div key={habit.id} className={`${cardBg} rounded-2xl p-4 border transition-all ${isCompleted ? darkMode ? 'border-green-700 bg-green-900 bg-opacity-20' : 'border-green-200 bg-green-50' : border}`}>
                                                <div className="flex items-center justify-between">
                                                    <div className="flex items-center space-x-3 flex-1">
                                                        <button onClick={() => toggleHabit(habit.id)} className={isCompleted ? 'text-green-500' : darkMode ? 'text-gray-600 hover:text-purple-400' : 'text-gray-300 hover:text-purple-500'}>
                                                            {isCompleted ? <CheckCircle2 /> : <Circle />}
                                                        </button>
                                                        <div className="flex-1">
                                                            <p className={`font-medium ${isCompleted ? 'text-green-700 line-through' : textPrimary}`}>{habit.name}</p>
                                                            <div className="flex items-center space-x-3 mt-1 flex-wrap">
                                                                <span className={`flex items-center space-x-1 text-xs ${textSecondary}`}><Clock /><span>{habit.reminderTime}{habit.remindersOn === false ? ' (muted)' : ''}</span></span>
                                                                <span className="flex items-center space-x-1 text-xs text-purple-600"><Flame /><span>{streak} day streak</span></span>
                                                                {habit.days && habit.days.length < 7 && <span className={`text-xs ${textSecondary}`}>{habit.days.sort().map(d => DAY_NAMES[d]).join(' ')}</span>}
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div className="flex flex-col space-y-1">
                                                        <button onClick={() => { setEditingHabit(habit.id); setHabitForm({ name: habit.name, reminderTime: habit.reminderTime || '09:00', category: habit.category || 'other', days: habit.days || [0,1,2,3,4,5,6], remindersOn: habit.remindersOn !== false }); setShowAddForm(true); window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }); }}
                                                            className={`${darkMode ? 'text-gray-600' : 'text-gray-400'} hover:text-purple-500 p-1`}><Pencil /></button>
                                                        <button onClick={() => removeHabit(habit.id)} className={`${darkMode ? 'text-gray-600' : 'text-gray-400'} hover:text-red-500 p-1`}><X /></button>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        ))}

                        {notScheduledToday.length > 0 && (
                            <p className={`text-xs ${textSecondary} mb-4`}>Not scheduled today: {notScheduledToday.map(h => h.name).join(', ')}</p>
                        )}

                        <div className="mt-2">
                            {showAddForm ? <HabitForm /> : (
                                <button onClick={() => { setEditingHabit(null); setHabitForm({ name: '', reminderTime: '09:00', category: 'health', days: [0,1,2,3,4,5,6], remindersOn: true }); setShowAddForm(true); }}
                                    className={`w-full ${cardBg} border-2 border-dashed ${darkMode ? 'border-gray-600 text-gray-400' : 'border-gray-300 text-gray-500'} rounded-2xl p-4 flex items-center justify-center space-x-2 hover:border-purple-400 hover:text-purple-500 transition-colors`}>
                                    <Plus /><span className="font-medium">Add new habit</span>
                                </button>
                            )}
                        </div>
                    </div>
                    <BottomNav /><Toast />
                </div>
            );
        }

        ReactDOM.render(<HabitTracker />, document.getElementById('root'));
    </script>
</body>
</html>
